<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random meal generator</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    <!-- Styles -->
    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header start -->
    <header>
      <h1>Random meal generator</h1>
    </header>
    <!-- Header end -->

    <!-- Main start -->
    <main class="main__content">
      <!-- section presentation start -->
      <section class="presentation">
        <h2 class="presentation__title">Feeling hungry?</h2>
        <h3 class="presentation__subtitle">
          Get a random meal by clicking below!
        </h3>
        <button class="btn">Get Meal 🍔</button>
      </section>
      <!-- section presentation end-->

      <!-- section result start -->
      <section class="meal__result"></section>
      <!-- section result end-->
    </main>
    <!-- Main end -->

    <!-- Footer start -->
    <footer>
      <p class="footer__text">
        &copy; <span class="footer__year"></span> - Random meal generator.
      </p>
    </footer>
    <!-- Footer end -->

    <!-- JS file import-->
    <script src="script.js"></script>
  </body>
</html>
